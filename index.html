<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#07090D"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Blueprint"/>
<title>Athletic Blueprint</title>
<style>
:root{
  --bg:#07090D;--surface:#0D1117;--card:#12181F;--card2:#161D26;--border:#1E2833;
  --text:#EAF0F6;--muted:#8FA2B7;--dim:#2A3644;
  --accent:#00D4FF;--accent2:#0091EA;--green:#00E87A;--orange:#FF6B2B;
  --purple:#A855F7;--red:#FF3B5C;--yellow:#FFD60A;--teal:#4CAF82;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:520px;margin:0 auto;padding-bottom:110px;}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit;}
a{text-decoration:none;color:inherit;}

/* ===== HEADER ===== */
.header{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,var(--bg) 75%,transparent);padding:14px 16px 4px;}
.header-inner{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:12px 14px;box-shadow:0 8px 24px rgba(0,0,0,0.5);}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.logo{font-size:17px;font-weight:900;letter-spacing:-0.5px;}
.logo span{background:linear-gradient(90deg,var(--accent),var(--purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.week-pill{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 10px;font-size:12px;font-weight:700;}
.week-pill b{color:var(--accent);min-width:18px;text-align:center;}
.week-btn{color:var(--muted);font-size:17px;padding:0 3px;line-height:1;}
.phase-strip{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.phase-bar{display:flex;gap:3px;flex:1;}
.phase-chip{flex:1;height:4px;border-radius:2px;background:var(--dim);transition:background 0.3s;}
.phase-chip.active{background:var(--accent);box-shadow:0 0 8px var(--accent);}
.phase-chip.done{background:var(--green);}
.phase-name{font-size:10px;font-weight:800;color:var(--accent);letter-spacing:0.5px;white-space:nowrap;}
.tabs{display:flex;gap:5px;}
.tab{flex:1;padding:9px 4px;border-radius:10px;font-size:11px;font-weight:800;background:var(--card);color:var(--muted);transition:all 0.2s;}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#001018;box-shadow:0 4px 12px rgba(0,212,255,0.3);}

/* ===== SCHEDULE ===== */
.schedule{padding:10px 16px;}
.today-banner{background:linear-gradient(135deg,#001A2A,#0A1A0E);border:1px solid #1A3A4A;border-radius:14px;padding:13px 15px;margin-bottom:12px;}
.today-title{font-size:11px;font-weight:800;color:var(--accent);letter-spacing:1px;margin-bottom:3px;}
.today-sub{font-size:13px;color:#C8D8E8;line-height:1.5;}
.today-sub b{color:var(--text);}
.phase-info{font-size:11px;color:var(--muted);line-height:1.55;margin-top:6px;}
.day-card{display:flex;align-items:center;width:100%;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px;margin-bottom:9px;text-align:left;transition:transform 0.1s;position:relative;overflow:hidden;}
.day-card:active{transform:scale(0.98);}
.day-glow{position:absolute;left:0;top:0;bottom:0;width:4px;}
.day-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;margin-right:12px;}
.day-meta{flex:1;min-width:0;}
.day-label{font-size:10px;font-weight:800;letter-spacing:1px;margin-bottom:2px;}
.day-name{font-size:15px;font-weight:800;margin-bottom:6px;color:var(--text);}
.sess-chips{display:flex;gap:5px;}
.sess-chip{flex:1;display:flex;align-items:center;gap:4px;font-size:9px;font-weight:800;padding:4px 6px;border-radius:6px;background:var(--surface);color:var(--muted);border:1px solid var(--border);}
.sess-chip.sdone{background:#06291A;color:var(--green);border-color:#0A4A2A;}
.day-arrow{color:var(--muted);font-size:18px;margin-left:8px;}

/* ===== DAY DETAIL ===== */
.day-detail{display:block;}
.day-header{padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
.back-btn{font-size:13px;margin-bottom:10px;display:block;font-weight:800;}
.day-header-info{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.day-header-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.dlabel{display:block;font-size:11px;font-weight:800;letter-spacing:1px;margin-bottom:3px;}
.dname{font-size:19px;font-weight:900;color:var(--text);}
.day-note{border-radius:0 10px 10px 0;padding:9px 12px;margin-bottom:10px;font-size:12px;color:#C0D0E0;line-height:1.5;border-left:3px solid;}
.rest-row{display:flex;align-items:center;gap:6px;}
.rest-label{font-size:10px;color:var(--muted);font-weight:800;letter-spacing:0.5px;}
.rest-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--accent);font-size:11px;font-weight:800;padding:6px 12px;}
.exercises-list{padding:10px 16px 16px;}

/* ===== SESSION BLOCKS ===== */
.session-block{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:14px;overflow:hidden;}
.session-head{display:flex;align-items:center;gap:10px;padding:13px 14px;background:var(--card2);}
.session-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.session-info{flex:1;min-width:0;}
.session-part{font-size:9px;font-weight:900;letter-spacing:1.5px;margin-bottom:1px;}
.session-title{font-size:14px;font-weight:800;color:var(--text);}
.session-est{font-size:10px;color:var(--muted);margin-top:1px;}
.session-prog{font-size:11px;font-weight:800;color:var(--muted);white-space:nowrap;}
.start-session-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:calc(100% - 24px);margin:10px 12px 4px;padding:11px;border-radius:10px;font-size:13px;font-weight:900;color:#001018;box-shadow:0 4px 14px rgba(0,212,255,0.25);}
.session-exs{padding:8px 12px 12px;}

/* ===== EXERCISE CARD ===== */
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:7px;overflow:hidden;}
.ex-card.checked{opacity:0.45;}
.ex-card.bonus{border-style:dashed;}
.ex-card.bonus.unlocked{border-style:solid;border-color:#3A3010;}
.ex-top{display:flex;align-items:center;padding:11px 12px;gap:10px;}
.ex-check{width:24px;height:24px;border-radius:8px;border:2px solid var(--dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.15s;color:#001018;font-weight:900;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:14px;font-weight:700;margin-bottom:2px;color:var(--text);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.bonus-badge{font-size:8px;font-weight:900;padding:2px 5px;border-radius:4px;background:#2A2010;color:var(--yellow);border:1px solid #3A3010;}
.locked-badge{font-size:8px;font-weight:900;padding:2px 5px;border-radius:4px;background:#161616;color:var(--muted);}
.db-badge{font-size:8px;font-weight:900;padding:2px 5px;border-radius:4px;background:#0A1A2E;color:#5BA8FF;border:1px solid #14304E;}
.pr-badge{font-size:8px;font-weight:900;padding:2px 5px;border-radius:4px;background:#2A0A14;color:#FF6B8A;border:1px solid #4A1424;}
.ex-sets{font-size:11px;color:var(--muted);}
.ex-sets b{color:var(--accent);}
.ex-actions{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.icon-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:12px;padding:5px 8px;color:var(--accent);font-weight:700;}
.expand-btn{color:var(--muted);font-size:16px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;}
.ex-expand{display:none;padding:0 12px 12px;border-top:1px solid var(--border);}
.ex-expand.open{display:block;}
.steps-title{font-size:9px;font-weight:900;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin:10px 0 6px;}
.step{display:flex;gap:8px;margin-bottom:5px;font-size:12px;color:#C5D5E5;line-height:1.5;}
.step-num{width:16px;height:16px;border-radius:50%;background:var(--dim);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--text);flex-shrink:0;margin-top:1px;}
.tip-box{background:var(--card);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:8px 10px;margin-top:8px;font-size:11px;color:#A8C8DC;line-height:1.5;}
.img-box{margin-top:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:none;}
.img-box.open{display:block;}
.img-box-header{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid var(--border);}
.img-box-title{font-size:11px;color:var(--muted);font-weight:700;}
.img-close-btn{color:var(--muted);font-size:15px;padding:0 2px;}
.img-link-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--surface);}
.img-link-row:last-child{border-bottom:none;}
.img-link-icon{font-size:18px;flex-shrink:0;}
.img-link-name{font-size:13px;font-weight:700;color:var(--text);}
.img-link-sub{font-size:10px;color:var(--muted);}
.img-link-arr{color:var(--muted);font-size:15px;margin-left:auto;}

/* ===== PROGRESS TAB ===== */
.progress-section{padding:10px 16px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;}
.stat-val{font-size:24px;font-weight:900;margin-bottom:2px;}
.stat-label{font-size:10px;color:var(--muted);font-weight:700;}
.panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.panel-title{font-size:13px;font-weight:900;color:var(--text);}
.panel-action{font-size:11px;font-weight:800;color:var(--accent);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 10px;}
.streak-bar{display:flex;gap:4px;flex-wrap:wrap;}
.streak-dot{width:30px;height:30px;border-radius:8px;background:var(--dim);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--muted);}
.streak-dot.done{background:var(--green);color:#001018;}
.streak-dot.today{border:2px solid var(--accent);}
.pr-card{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border);}
.pr-card:last-child{border-bottom:none;}
.pr-icon{font-size:20px;width:34px;text-align:center;flex-shrink:0;}
.pr-info{flex:1;min-width:0;}
.pr-name{font-size:12px;font-weight:800;color:var(--text);margin-bottom:3px;}
.pr-track{height:5px;background:var(--dim);border-radius:3px;overflow:hidden;margin-bottom:3px;}
.pr-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width 0.4s;}
.pr-nums{font-size:10px;color:var(--muted);}
.pr-nums b{color:var(--green);}
.pr-log-btn{font-size:10px;font-weight:900;color:#001018;background:var(--accent);border-radius:8px;padding:6px 10px;flex-shrink:0;}
.weight-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
.weight-row:last-child{border-bottom:none;}
.weight-val{font-weight:800;color:var(--text);}
.weight-date{color:var(--muted);font-size:11px;}
.weight-delta{font-size:11px;font-weight:800;}
.mile-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mile-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;display:flex;align-items:center;gap:9px;}
.mile-card.unlocked{border-color:#0A4A2A;background:#06200F;}
.mile-icon{font-size:18px;flex-shrink:0;filter:grayscale(1);opacity:0.4;}
.mile-card.unlocked .mile-icon{filter:none;opacity:1;}
.mile-name{font-size:10px;font-weight:800;color:var(--muted);line-height:1.3;}
.mile-card.unlocked .mile-name{color:var(--green);}
.log-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
.log-item:last-child{border-bottom:none;}
.log-name{color:var(--text);font-weight:700;}
.log-meta{color:var(--muted);font-size:11px;}
.export-row{display:flex;gap:8px;}
.export-btn{flex:1;padding:12px;border-radius:11px;font-size:12px;font-weight:900;}
.export-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#001018;}
.export-btn.secondary{background:var(--card2);border:1px solid var(--border);color:var(--text);}

/* ===== RULES ===== */
.rules-section{padding:10px 16px;}
.rule-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px;margin-bottom:9px;display:flex;gap:13px;}
.rule-icon{font-size:21px;flex-shrink:0;}
.rule-title{font-size:13px;font-weight:800;margin-bottom:3px;color:var(--text);}
.rule-desc{font-size:12px;color:#B5C5D5;line-height:1.55;}

/* ===== TIMER BAR ===== */
.timer-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(110%);width:100%;max-width:520px;background:var(--card2);border-top:2px solid var(--accent);padding:12px 18px calc(14px + env(safe-area-inset-bottom));z-index:300;transition:transform 0.3s;display:flex;align-items:center;gap:14px;box-shadow:0 -8px 30px rgba(0,0,0,0.6);}
.timer-bar.show{transform:translateX(-50%) translateY(0);}
.timer-time{font-size:32px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--accent);min-width:96px;}
.timer-time.ending{color:var(--red);animation:pulse 0.5s infinite alternate;}
@keyframes pulse{from{opacity:1;}to{opacity:0.5;}}
.timer-label{flex:1;font-size:12px;color:var(--muted);font-weight:700;line-height:1.3;}
.timer-controls{display:flex;gap:7px;}
.timer-ctrl{width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--border);font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text);}
.timer-ctrl.main{background:var(--accent);color:#001018;border:none;}

/* ===== GUIDED MODE ===== */
.guided-overlay{position:fixed;inset:0;background:var(--bg);z-index:400;display:none;flex-direction:column;max-width:520px;margin:0 auto;}
.guided-overlay.show{display:flex;}
.guided-head{display:flex;align-items:center;justify-content:space-between;padding:16px;}
.guided-close{font-size:14px;color:var(--muted);font-weight:800;}
.guided-dots{display:flex;gap:4px;}
.gdot{width:8px;height:8px;border-radius:50%;background:var(--dim);}
.gdot.gdone{background:var(--green);}
.gdot.gcurrent{background:var(--accent);transform:scale(1.3);}
.guided-body{flex:1;overflow-y:auto;padding:8px 22px;}
.guided-part{font-size:10px;font-weight:900;letter-spacing:2px;color:var(--accent);margin-bottom:6px;}
.guided-exname{font-size:28px;font-weight:900;color:var(--text);line-height:1.15;margin-bottom:8px;}
.guided-sets{font-size:15px;color:var(--muted);margin-bottom:18px;}
.guided-sets b{color:var(--accent);font-size:17px;}
.guided-steps{margin-bottom:14px;}
.gstep{display:flex;gap:10px;margin-bottom:9px;font-size:14px;color:#C5D5E5;line-height:1.55;}
.gstep-num{width:20px;height:20px;border-radius:50%;background:var(--dim);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0;margin-top:2px;}
.guided-tip{background:var(--card);border-left:3px solid var(--yellow);border-radius:0 10px 10px 0;padding:11px 13px;font-size:12px;color:#C8C0A0;line-height:1.5;}
.guided-timer-btn{display:inline-flex;align-items:center;gap:7px;margin-top:14px;background:var(--card);border:1px solid var(--accent);border-radius:11px;color:var(--accent);font-size:13px;font-weight:800;padding:10px 16px;}
.guided-foot{display:flex;gap:9px;padding:14px 18px calc(18px + env(safe-area-inset-bottom));}
.gbtn{flex:1;padding:15px;border-radius:13px;font-size:14px;font-weight:900;}
.gbtn.skip{background:var(--card);border:1px solid var(--border);color:var(--muted);}
.gbtn.done{background:linear-gradient(135deg,var(--green),#00B85F);color:#001018;box-shadow:0 4px 16px rgba(0,232,122,0.3);}

/* ===== MISC ===== */
.install-banner{margin:8px 16px 0;background:linear-gradient(135deg,#0A1A2A,#0A2A1A);border:1px solid #1A3A4A;border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
.install-banner span{flex:1;font-size:12px;color:#B5CCDC;}
.install-banner b{color:var(--accent);}
.install-btn{background:var(--accent);border-radius:8px;color:#001018;font-size:11px;font-weight:900;padding:7px 13px;flex-shrink:0;}
.install-close{color:var(--muted);font-size:15px;flex-shrink:0;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(140px);background:var(--green);color:#001018;padding:11px 22px;border-radius:24px;font-size:13px;font-weight:900;transition:transform 0.3s;z-index:999;pointer-events:none;box-shadow:0 8px 24px rgba(0,232,122,0.35);}
.toast.show{transform:translateX(-50%) translateY(0);}
.anim-wrap{margin-top:10px;background:#0A0F15;border:1px solid var(--border);border-radius:12px;padding:8px 6px 4px;display:flex;justify-content:center;}
.anim-wrap svg{width:100%;max-width:270px;height:auto;}
.anim-wrap.big{padding:14px 10px 8px;margin:0 0 16px;}
.anim-wrap.big svg{max-width:340px;}
.anim-label{text-align:center;font-size:9px;font-weight:800;color:var(--muted);letter-spacing:1px;margin-top:8px;text-transform:uppercase;}
.quick-head{font-size:10px;font-weight:900;color:var(--muted);letter-spacing:2px;margin:18px 2px 9px;}
.special-card{display:flex;align-items:center;width:100%;background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:8px;text-align:left;position:relative;overflow:hidden;}
.special-sub{font-size:11px;color:var(--muted);line-height:1.4;margin-top:2px;}
.link-row{display:flex;gap:6px;margin-top:8px;}
.link-chip{flex:1;text-align:center;font-size:10px;font-weight:800;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 4px;}
.media-slot{margin-top:10px;}
.media-slot img{width:100%;border-radius:12px;border:1px solid var(--border);display:block;}
.media-btn-row{display:flex;gap:6px;margin-top:8px;}
.media-add{flex:1;font-size:11px;font-weight:800;color:var(--accent);background:var(--card);border:1px dashed var(--accent);border-radius:9px;padding:9px 6px;}
.media-rm{font-size:11px;font-weight:800;color:var(--red);background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 12px;}
.library-section{padding:10px 16px;}
.lib-search{width:100%;background:var(--card);border:1px solid var(--border);border-radius:11px;color:var(--text);font-size:13px;padding:11px 14px;margin-bottom:12px;font-family:inherit;}
.lib-day-head{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:900;margin:14px 2px 7px;}
.lib-row{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:10px 12px;margin-bottom:6px;}
.lib-name{flex:1;font-size:13px;font-weight:700;color:var(--text);min-width:0;}
.lib-badges{display:flex;gap:4px;}
.lib-edited{font-size:8px;font-weight:900;padding:2px 5px;border-radius:4px;background:#1A2A0A;color:#A8E060;}
.lib-media-badge{font-size:11px;}
.lib-edit-btn{font-size:11px;font-weight:800;color:var(--accent);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 11px;flex-shrink:0;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:flex;align-items:flex-end;justify-content:center;}
.modal-overlay.hidden{display:none!important;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:18px 18px calc(30px + env(safe-area-inset-bottom));width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--dim);border-radius:2px;margin:0 auto 14px;}
.modal-title{font-size:17px;font-weight:900;color:var(--text);}
.modal-close{color:var(--muted);font-size:20px;}
.edit-label{font-size:10px;font-weight:900;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:10px 0 5px;}
.edit-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;padding:10px 12px;font-family:inherit;resize:vertical;}
.edit-row{display:flex;gap:9px;}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo">Athletic <span>Blueprint</span></div>
      <div class="week-pill">
        <button class="week-btn" onclick="changeWeek(-1)">&#8249;</button>
        Wk <b id="weekNum">1</b>
        <button class="week-btn" onclick="changeWeek(1)">&#8250;</button>
      </div>
    </div>
    <div class="phase-strip">
      <div class="phase-bar" id="phaseBar"></div>
      <div class="phase-name" id="phaseName"></div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab_schedule" onclick="switchTab('schedule')">&#128197; Train</button>
      <button class="tab" id="tab_library" onclick="switchTab('library')">&#128218; Library</button>
      <button class="tab" id="tab_progress" onclick="switchTab('progress')">&#128200; Progress</button>
      <button class="tab" id="tab_rules" onclick="switchTab('rules')">&#128203; Rules</button>
    </div>
  </div>
</div>

<div id="installBanner" class="install-banner hidden">
  <span>&#128242; Install <b>Athletic Blueprint</b> for offline use</span>
  <button class="install-btn" onclick="installPWA()">Install</button>
  <button class="install-close" onclick="hideInstall()">&#10005;</button>
</div>

<div id="scheduleView">
  <div class="schedule" id="scheduleList"></div>
  <div class="day-detail hidden" id="dayDetail"></div>
</div>
<div id="progressView" class="hidden progress-section"></div>
<div id="rulesView" class="hidden rules-section"></div>
<div id="libraryView" class="hidden library-section"></div>

<div class="modal-overlay hidden" id="editModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div class="modal-title" style="margin:0">&#9999;&#65039; Edit Exercise</div>
      <button class="modal-close" onclick="closeEdit()">&#10005;</button>
    </div>
    <div class="edit-label">Name</div>
    <input class="edit-input" id="editName"/>
    <div class="edit-row">
      <div style="flex:1"><div class="edit-label">Sets</div><input class="edit-input" id="editSets"/></div>
      <div style="flex:1"><div class="edit-label">Reps / Time</div><input class="edit-input" id="editReps"/></div>
    </div>
    <div class="edit-label">Steps (one per line)</div>
    <textarea class="edit-input" id="editSteps" rows="5"></textarea>
    <div class="edit-label">Tip</div>
    <textarea class="edit-input" id="editTip" rows="2"></textarea>
    <div class="edit-label">My GIF / Image</div>
    <div id="editMedia"></div>
    <div class="export-row" style="margin-top:14px">
      <button class="export-btn primary" onclick="saveEdit()">&#10003; Save</button>
      <button class="export-btn secondary" onclick="resetEdit()">Reset Default</button>
    </div>
  </div>
</div>

<div class="guided-overlay" id="guidedOverlay">
  <div class="guided-head">
    <button class="guided-close" onclick="exitGuided()">&#10005; Exit</button>
    <div class="guided-dots" id="guidedDots"></div>
    <div style="width:44px"></div>
  </div>
  <div class="guided-body" id="guidedBody"></div>
  <div class="guided-foot">
    <button class="gbtn skip" onclick="guidedSkip()">Skip</button>
    <button class="gbtn done" onclick="guidedDone()">&#10003; Done, Next</button>
  </div>
</div>

<div class="timer-bar" id="timerBar">
  <div class="timer-time" id="timerTime">0:00</div>
  <div class="timer-label" id="timerLabel"></div>
  <div class="timer-controls">
    <button class="timer-ctrl" onclick="timerAdd(15)">+15</button>
    <button class="timer-ctrl main" id="timerToggle" onclick="timerToggle()">&#10074;&#10074;</button>
    <button class="timer-ctrl" onclick="timerClose()">&#10005;</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="importInput" style="display:none" accept=".json" onchange="importData(event)"/>
<script>
// ============ STATE ============
var currentWeek=parseInt(localStorage.getItem('ab2_week')||'1');
var history=JSON.parse(localStorage.getItem('ab2_history')||'{}');
var prs=JSON.parse(localStorage.getItem('ab2_prs')||'{}');
var weights=JSON.parse(localStorage.getItem('ab2_weights')||'[]');
var miles=JSON.parse(localStorage.getItem('ab2_miles')||'{}');
var activeDay=null,currentTab='schedule',deferredInstall=null;
var guided={active:false,dayId:null,sIdx:null,list:[],pos:0};
var wakeLock=null;

function save(){
  localStorage.setItem('ab2_week',currentWeek);
  localStorage.setItem('ab2_history',JSON.stringify(history));
  localStorage.setItem('ab2_prs',JSON.stringify(prs));
  localStorage.setItem('ab2_weights',JSON.stringify(weights));
  localStorage.setItem('ab2_miles',JSON.stringify(miles));
}
function todayKey(){return new Date().toISOString().slice(0,10);}
function todayRec(){
  var t=todayKey();
  if(!history[t])history[t]={checks:{},sessions:{},days:{}};
  if(!history[t].checks)history[t].checks={};
  if(!history[t].sessions)history[t].sessions={};
  if(!history[t].days)history[t].days={};
  return history[t];
}
function isChecked(key){var t=history[todayKey()];return !!(t&&t.checks&&t.checks[key]);}

// ============ PHASES ============
var PHASES=[
  {num:1,weeks:"1-4",title:"Foundation",color:"#00D4FF",desc:"Learn movements, build base, start fat loss. Shoulder-safe. Form over reps.",plyo:"Plyometrics: HOLD - light jumps only."},
  {num:2,weeks:"5-8",title:"Build",color:"#00E87A",desc:"Volume up. 50 to 80 squats. First real plyometrics. Cardio base grows fast.",plyo:"Plyometrics: UNLOCKED - pogos, squat jumps, hops."},
  {num:3,weeks:"9-12",title:"Explosive",color:"#FF6B2B",desc:"100 to 150 squats. Explosive power, agility, full plyometrics.",plyo:"Plyometrics: FULL PROGRAM active."},
  {num:4,weeks:"13-16",title:"Peak",color:"#A855F7",desc:"200 squats, peak explosiveness, max stamina. Full load everything.",plyo:"Plyometrics: MAX intensity. Add dumbbells where possible."},
  {num:5,weeks:"17-30",title:"Mastery",color:"#FFD60A",desc:"Beyond peak. 100 pushups, 200+ squats, total endurance. Maintain and exceed. This is the 10x zone.",plyo:"Everything unlocked. Chase your PRs weekly."},
];
function getPhase(w){return w>16?5:Math.min(4,Math.ceil(w/4));}
function getWeekInPhase(w){return w>16?Math.min(4,Math.ceil((w-16)/4)):((w-1)%4)+1;}
function repsScale(base,inc,w){return base+(getPhase(w)-1)*inc;}

function getKegel(w){var p=getPhase(w),wp=getWeekInPhase(w),b=[[10,12,15,20],[20,25,30,40],[40,50,60,80],[80,100,120,150],[150,160,180,200]];return b[p-1][wp-1]+' reps - '+([5,6,8,10,12][p-1]+wp)+'s hold';}
function getHipThrust(w){var p=getPhase(w),wp=getWeekInPhase(w),b=[[15,20,25,30],[35,40,45,50],[50,55,60,70],[70,80,90,100],[100,110,120,130]];return '3 x '+b[p-1][wp-1]+' reps';}
function getPlank(w){var p=getPhase(w),wp=getWeekInPhase(w),b=[[20,25,30,40],[45,50,60,75],[80,90,105,120],[120,135,150,180],[180,210,240,300]];return b[p-1][wp-1]+' sec';}

// ============ PR BENCHMARKS ============
var PR_DEFS=[
  {id:'squat',name:'Max Squats unbroken',unit:'reps',icon:'\uD83E\uDDB5',goal:200},
  {id:'pushup',name:'Max Push-Ups unbroken',unit:'reps',icon:'\uD83D\uDCAA',goal:100},
  {id:'plank',name:'Max Plank Hold',unit:'sec',icon:'\uD83C\uDFD4\uFE0F',goal:300},
  {id:'hipthrust',name:'Max Hip Thrusts unbroken',unit:'reps',icon:'\uD83D\uDD25',goal:150},
  {id:'kegelhold',name:'Max Kegel Hold',unit:'sec',icon:'\uD83C\uDFAF',goal:60},
  {id:'wallsit',name:'Max Wall Sit',unit:'sec',icon:'\uD83E\uDE91',goal:300},
  {id:'burpee',name:'Max Burpees unbroken',unit:'reps',icon:'\u26A1',goal:50},
  {id:'deadhang',name:'Max Dead Hang',unit:'sec',icon:'\uD83E\uDD32',goal:120},
];
function prBest(id){var a=prs[id]||[];var best=0;a.forEach(function(e){if(e.val>best)best=e.val;});return best;}
function prLatest(id){var a=prs[id]||[];return a.length?a[a.length-1].val:0;}

// ============ MILESTONES ============
var MILE_DEFS=[
  {id:'first_session',icon:'\uD83C\uDF31',name:'First session done'},
  {id:'first_day',icon:'\uD83C\uDFC5',name:'First full day (3 parts)'},
  {id:'streak7',icon:'\uD83D\uDD25',name:'7-day streak'},
  {id:'streak30',icon:'\uD83C\uDF0B',name:'30-day streak'},
  {id:'streak100',icon:'\uD83D\uDC8E',name:'100-day streak'},
  {id:'squat50',icon:'\uD83E\uDDB5',name:'50 squats unbroken'},
  {id:'squat100',icon:'\uD83E\uDDBF',name:'100 squats unbroken'},
  {id:'squat200',icon:'\uD83D\uDC51',name:'200 SQUATS - THE GOAL'},
  {id:'pushup20',icon:'\uD83D\uDCAA',name:'20 push-ups unbroken'},
  {id:'pushup50',icon:'\uD83E\uDDBE',name:'50 push-ups unbroken'},
  {id:'pushup100',icon:'\uD83E\uDD16',name:'100 PUSH-UPS - ELITE'},
  {id:'plank120',icon:'\uD83C\uDFD4\uFE0F',name:'2-minute plank'},
  {id:'plank300',icon:'\uD83E\uDDCA',name:'5-minute plank'},
  {id:'hip100',icon:'\uD83D\uDD25',name:'100 hip thrusts unbroken'},
  {id:'week8',icon:'\uD83D\uDCC8',name:'Reached week 8'},
  {id:'week16',icon:'\uD83C\uDFC6',name:'Completed 16 weeks'},
  {id:'week26',icon:'\uD83C\uDF1F',name:'180+ days of training'},
];
function unlockMile(id){
  if(miles[id])return;
  miles[id]=Date.now();save();
  var def=MILE_DEFS.find(function(m){return m.id===id;});
  if(def)showToast(def.icon+' Milestone: '+def.name+'!');
}
function checkPrMiles(id,val){
  if(id==='squat'){if(val>=50)unlockMile('squat50');if(val>=100)unlockMile('squat100');if(val>=200)unlockMile('squat200');}
  if(id==='pushup'){if(val>=20)unlockMile('pushup20');if(val>=50)unlockMile('pushup50');if(val>=100)unlockMile('pushup100');}
  if(id==='plank'){if(val>=120)unlockMile('plank120');if(val>=300)unlockMile('plank300');}
  if(id==='hipthrust'&&val>=100)unlockMile('hip100');
}
function checkStreakMiles(){
  var s=calcStreak();
  if(s>=7)unlockMile('streak7');
  if(s>=30)unlockMile('streak30');
  if(s>=100)unlockMile('streak100');
}
function calcStreak(){
  var dates=Object.keys(history).filter(function(k){
    var h=history[k];return h&&((h.checks&&Object.keys(h.checks).length)||(h.sessions&&Object.keys(h.sessions).length));
  });
  var set=new Set(dates);var streak=0;
  for(var i=0;i<400;i++){
    var d=new Date();d.setDate(d.getDate()-i);
    var dk=d.toISOString().slice(0,10);
    if(set.has(dk))streak++;
    else if(i>0)break;
  }
  return streak;
}

var DAYS=[

function animVal(poses,j,xi){
  var arr=poses.map(function(p){return p[j][xi];});
  arr.push(poses[0][j][xi]);
  return arr.join(';');
}
function animTag(attr,vals,dur){
  return '<animate attributeName="'+attr+'" values="'+vals+'" dur="'+dur+'s" repeatCount="indefinite"/>';
}
function animLine(t,a,b,color){
  var p=t.poses,d=t.dur;
  var s='<line x1="'+p[0][a][0]+'" y1="'+p[0][a][1]+'" x2="'+p[0][b][0]+'" y2="'+p[0][b][1]+'" stroke="'+color+'" stroke-width="5" stroke-linecap="round">';
  s+=animTag('x1',animVal(p,a,0),d)+animTag('y1',animVal(p,a,1),d);
  s+=animTag('x2',animVal(p,b,0),d)+animTag('y2',animVal(p,b,1),d);
  return s+'</line>';
}
function genAnim(name,color){
  var key=pickAnim(name);
  var t=ANIM_T[key];
  if(!t)t=ANIM_T.squat;
  var d=t.dur,p=t.poses;
  var s='<svg viewBox="0 0 200 132" xmlns="http://www.w3.org/2000/svg">';
  s+='<line x1="14" y1="123" x2="186" y2="123" stroke="#28323E" stroke-width="2.5" stroke-linecap="round"/>';
  if(t.props)t.props.forEach(function(pr){
    s+='<line x1="'+pr[0]+'" y1="'+pr[1]+'" x2="'+pr[2]+'" y2="'+pr[3]+'" stroke="#3A4A5E" stroke-width="4" stroke-linecap="round"/>';
  });
  var limbs=[['N','P'],['P','KB'],['KB','AB'],['N','EB'],['EB','WB'],['P','KF'],['KF','AF'],['N','EF'],['EF','WF']];
  limbs.forEach(function(l,i){
    var c=(i<5)?shade(color):color;
    s+=animLine(t,l[0],l[1],c);
  });
  s+='<circle cx="'+p[0].H[0]+'" cy="'+p[0].H[1]+'" r="9" fill="'+color+'">';
  s+=animTag('cx',animVal(p,'H',0),d)+animTag('cy',animVal(p,'H',1),d)+'</circle>';
  if(t.db){
    s+='<circle cx="'+p[0].WF[0]+'" cy="'+p[0].WF[1]+'" r="6" fill="#5BA8FF">';
    s+=animTag('cx',animVal(p,'WF',0),d)+animTag('cy',animVal(p,'WF',1),d)+'</circle>';
  }
  if(t.chest){
    s+='<circle cx="100" cy="70" r="8" fill="none" stroke="#4CAF82" stroke-width="2" opacity="0.8">';
    s+=animTag('r','8;17;8',d)+animTag('opacity','0.8;0.25;0.8',d)+'</circle>';
  }
  if(t.pelvis){
    s+='<circle cx="100" cy="93" r="5" fill="#FF6B8A" opacity="0.9">';
    s+=animTag('r','5;11;5',d)+animTag('opacity','0.9;0.3;0.9',d)+'</circle>';
  }
  s+='</svg>';
  return s;
}
function shade(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgb('+Math.round(r*0.45)+','+Math.round(g*0.45)+','+Math.round(b*0.45)+')';
}

function allDays(){return DAYS.concat(SPECIALS);}
function findDay(id){return allDays().find(function(d){return d.id===id;});}

var edits=JSON.parse(localStorage.getItem('ab2_edits')||'{}');
allDays().forEach(function(d){d.sessions.forEach(function(s){s.exercises.forEach(function(ex){ex._key=d.id+'|'+s.sid+'|'+ex.name;});});});
function fxName(ex){var e=edits[ex._key];return (e&&e.name)?e.name:ex.name;}
function fxSets(ex,w){var e=edits[ex._key];return (e&&e.sets)?e.sets:ex.sets(w);}
function fxReps(ex,w){var e=edits[ex._key];return (e&&e.reps)?e.reps:ex.reps(w);}
function fxSteps(ex){var e=edits[ex._key];return (e&&e.steps&&e.steps.length)?e.steps:ex.steps;}
function fxTip(ex){var e=edits[ex._key];return (e&&typeof e.tip==='string')?e.tip:ex.tip;}

// ============ MEDIA (IndexedDB - permanent storage) ============
var idb=null,mediaKeySet={};
function idbOpen(cb){
  if(typeof indexedDB==='undefined'){cb(null);return;}
  if(idb){cb(idb);return;}
  try{
    var r=indexedDB.open('ab2media',1);
    r.onupgradeneeded=function(e){e.target.result.createObjectStore('m');};
    r.onsuccess=function(e){idb=e.target.result;cb(idb);};
    r.onerror=function(){cb(null);};
  }catch(e){cb(null);}
}
function mediaSet(key,val,cb){idbOpen(function(db){if(!db){if(cb)cb(false);return;}var tx=db.transaction('m','readwrite');tx.objectStore('m').put(val,key);tx.oncomplete=function(){mediaKeySet[key]=1;if(cb)cb(true);};tx.onerror=function(){if(cb)cb(false);};});}
function mediaGet(key,cb){idbOpen(function(db){if(!db){cb(null);return;}var rq=db.transaction('m').objectStore('m').get(key);rq.onsuccess=function(){cb(rq.result||null);};rq.onerror=function(){cb(null);};});}
function mediaDel(key,cb){idbOpen(function(db){if(!db){if(cb)cb();return;}var tx=db.transaction('m','readwrite');tx.objectStore('m').delete(key);tx.oncomplete=function(){delete mediaKeySet[key];if(cb)cb();};});}
function mediaLoadKeys(cb){idbOpen(function(db){if(!db){if(cb)cb();return;}var rq=db.transaction('m').objectStore('m').getAllKeys();rq.onsuccess=function(){mediaKeySet={};(rq.result||[]).forEach(function(k){mediaKeySet[k]=1;});if(cb)cb();};rq.onerror=function(){if(cb)cb();};});}
function hasMedia(key){return !!mediaKeySet[key];}

function mediaUpload(key){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.onchange=function(){
    var f=inp.files[0];if(!f)return;
    if(f.size>10*1024*1024){alert('File too big - max 10MB');return;}
    var rd=new FileReader();
    rd.onload=function(e){
      mediaSet(key,e.target.result,function(ok){
        if(ok){showToast('\u2713 Media saved permanently!');refreshMediaUI();}
        else alert('Storage failed');
      });
    };
    rd.readAsDataURL(f);
  };
  inp.click();
}
function mediaRemove(key){
  if(!confirm('Remove your custom media for this exercise?'))return;
  mediaDel(key,function(){showToast('\u2713 Removed');refreshMediaUI();});
}
function refreshMediaUI(){
  if(activeDay)renderDayDetail(findDay(activeDay));
  if(currentTab==='library')renderLibrary(document.getElementById('libSearch')?document.getElementById('libSearch').value:'');
  if(editingKey)fillEditMedia();
  loadMediaSlots(document.body);
}
function loadMediaSlots(root){
  var slots=root.querySelectorAll('.media-slot[data-mkey]');
  for(var i=0;i<slots.length;i++){
    (function(slot){
      var key=slot.dataset.mkey;
      if(!hasMedia(key)){slot.innerHTML='';return;}
      if(slot.dataset.loaded==='1')return;
      mediaGet(key,function(data){
        if(!data)return;
        slot.innerHTML='<img src="'+data+'" alt="demo"/>';
        slot.dataset.loaded='1';
        var wrap=slot.parentElement?slot.parentElement.querySelector('.anim-wrap'):null;
        if(wrap)wrap.classList.add('hidden');
        var lbl=slot.parentElement?slot.parentElement.querySelector('.anim-label'):null;
        if(lbl)lbl.textContent='Your demo';
      });
    })(slots[i]);
  }
}

function sessProgress(dayId,sess){
  var total=0,done=0;
  sess.exercises.forEach(function(ex,ei){
    if(ex.base||(ex.unlockWeek&&currentWeek>=ex.unlockWeek)){
      total++;
      if(isChecked('d'+dayId+'_'+sess.sid+'_e'+ei))done++;
    }
  });
  return{done:done,total:total};
}

function parseTime(repsStr){
  var m=repsStr.match(/(\d+)\s*sec/);
  if(m)return parseInt(m[1]);
  var m2=repsStr.match(/(\d+)\s*min/);
  if(m2)return parseInt(m2[1])*60;
  return 0;
}

// ============ CHECK HANDLING ============
function handleCheck(btn){
  if(btn.dataset.unlocked==='0')return;
  toggleCheck(btn.dataset.key,btn.dataset.color);
}
function toggleCheck(key,color){
  var rec=todayRec();
  rec.checks[key]=!rec.checks[key];
  if(!rec.checks[key])delete rec.checks[key];
  save();
  var card=document.getElementById('card_'+key);
  var btn=card?card.querySelector('.ex-check'):null;
  var on=isChecked(key);
  if(card)card.classList.toggle('checked',on);
  if(btn){btn.classList.toggle('done',on);btn.style.background=on?color:'';btn.style.borderColor=on?'':color+'55';btn.innerHTML=on?'\u2713':'';}
  if(on)afterCheck(key);
  if(activeDay)refreshSessionHeaders();
}
function afterCheck(key){
  var parts=key.split('_');
  var dayId=parseInt(parts[0].slice(1)),sid=parts[1];
  var day=findDay(dayId);
  var sess=day.sessions.find(function(s){return s.sid===sid;});
  var p=sessProgress(dayId,sess);
  var rec=todayRec();
  if(p.done===p.total&&p.total>0){
    var skey='d'+dayId+'_'+sid;
    if(!rec.sessions[skey]){
      rec.sessions[skey]={ts:Date.now(),dayId:dayId,sid:sid,dayName:day.name,label:sess.label};
      save();
      unlockMile('first_session');
      showToast('\uD83C\uDF89 Part '+sid+' complete!');
      var allDone=day.sessions.every(function(s){return rec.sessions['d'+dayId+'_'+s.sid];});
      if(allDone){
        rec.days['d'+dayId]={ts:Date.now(),dayId:dayId,dayName:day.name};
        save();
        if(!day.special)unlockMile('first_day');
        showToast('\uD83C\uDFC6 '+(day.special?day.name:'FULL DAY '+dayId)+' COMPLETE!');
      }
    }
  }else{
    showToast('\u2713 Done');
  }
  checkStreakMiles();
}
function refreshSessionHeaders(){
  var day=findDay(activeDay);
  if(day)renderDayDetail(day);
}

function toggleExpand(id){
  var el=document.getElementById(id);
  if(!el)return;
  var open=el.classList.toggle('open');
  var card=el.closest('.ex-card');
  var btn=card?card.querySelector('.expand-btn'):null;
  if(btn)btn.innerHTML=open?'\u25B4':'\u25BE';
  if(open)loadMediaSlots(el);
}


// ============ TIMER ============
var timerSec=0,timerTotal=0,timerInt=null,timerRunning=false;
function startTimer(sec,label){
  timerSec=sec;timerTotal=sec;timerRunning=true;
  document.getElementById('timerLabel').textContent=label||'Timer';
  document.getElementById('timerBar').classList.add('show');
  document.getElementById('timerToggle').innerHTML='\u275A\u275A';
  clearInterval(timerInt);
  timerInt=setInterval(timerTick,1000);
  timerRender();
}
function timerTick(){
  if(!timerRunning)return;
  timerSec--;
  timerRender();
  if(timerSec<=0){
    clearInterval(timerInt);timerRunning=false;
    beep();vibrate();
    document.getElementById('timerLabel').textContent='DONE!';
    setTimeout(timerClose,2500);
  }
}
function timerRender(){
  var t=document.getElementById('timerTime');
  var m=Math.floor(Math.max(0,timerSec)/60),s=Math.max(0,timerSec)%60;
  t.textContent=m+':'+(s<10?'0':'')+s;
  t.classList.toggle('ending',timerSec<=5&&timerSec>0);
}
function timerToggle(){
  timerRunning=!timerRunning;
  document.getElementById('timerToggle').innerHTML=timerRunning?'\u275A\u275A':'\u25B6';
}
function timerAdd(s){timerSec+=s;timerRender();}
function timerClose(){
  clearInterval(timerInt);timerRunning=false;
  document.getElementById('timerBar').classList.remove('show');
}
function beep(){
  try{
    var ctx=new (window.AudioContext||window.webkitAudioContext)();
    [0,0.25,0.5].forEach(function(d){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;g.gain.value=0.3;
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+0.18);
    });
  }catch(e){}
}
function vibrate(){if(navigator.vibrate)navigator.vibrate([200,100,200,100,400]);}

// ============ GUIDED MODE ============
function startGuided(dayId,sIdx){
  var day=findDay(dayId);
  var sess=day.sessions[sIdx];
  var list=[];
  sess.exercises.forEach(function(ex,ei){
    if(ex.base||(ex.unlockWeek&&currentWeek>=ex.unlockWeek))list.push({ex:ex,ei:ei});
  });
  if(!list.length)return;
  guided={active:true,dayId:dayId,sIdx:sIdx,sid:sess.sid,list:list,pos:0,day:day,sess:sess};
  document.getElementById('guidedOverlay').classList.add('show');
  reqWakeLock();
  renderGuided();
}
function renderGuided(){
  var g=guided;
  if(g.pos>=g.list.length){finishGuided();return;}
  var item=g.list[g.pos],ex=item.ex;
  var dots='';
  g.list.forEach(function(_,i){dots+='<div class="gdot'+(i<g.pos?' gdone':i===g.pos?' gcurrent':'')+'"></div>';});
  document.getElementById('guidedDots').innerHTML=dots;
  var sets=fxSets(ex,currentWeek),reps=fxReps(ex,currentWeek);
  var timed=parseTime(reps);
  var h='<div class="guided-part" style="color:'+g.day.color+'">'+(g.day.special?g.day.tag:'DAY '+g.dayId)+' \u00B7 PART '+g.sid+' \u00B7 '+(g.pos+1)+' OF '+g.list.length+'</div>';
  h+='<div class="guided-exname">'+fxName(ex)+'</div>';
  h+='<div class="guided-sets"><b>'+sets+'</b> \u00B7 '+reps+'</div>';
  h+='<div class="media-slot" data-mkey="'+ex._key+'"></div>';
  h+='<div class="anim-wrap big">'+genAnim(ex.name,g.day.color)+'</div>';
  h+='<div class="guided-steps">';
  fxSteps(ex).forEach(function(s,i){h+='<div class="gstep"><div class="gstep-num">'+(i+1)+'</div><div>'+s+'</div></div>';});
  h+='</div>';
  var gtip=fxTip(ex);
  if(gtip)h+='<div class="guided-tip">\uD83D\uDCA1 '+gtip+'</div>';
  if(timed>0)h+='<button class="guided-timer-btn" data-sec="'+timed+'" data-name="'+ex.name+'" onclick="startTimer(parseInt(this.dataset.sec),this.dataset.name)">\u23F1 Start '+timed+'s timer</button>';
  document.getElementById('guidedBody').innerHTML=h;
  document.getElementById('guidedBody').scrollTop=0;
  loadMediaSlots(document.getElementById('guidedBody'));
}
function guidedDone(){
  var g=guided,item=g.list[g.pos];
  var key='d'+g.dayId+'_'+g.sid+'_e'+item.ei;
  var rec=todayRec();
  if(!rec.checks[key]){rec.checks[key]=true;save();afterCheck(key);}
  g.pos++;renderGuided();
}
function guidedSkip(){guided.pos++;renderGuided();}
function finishGuided(){
  document.getElementById('guidedBody').innerHTML='<div style="text-align:center;padding:60px 20px;"><div style="font-size:64px;margin-bottom:16px;">\uD83C\uDF89</div><div style="font-size:24px;font-weight:900;margin-bottom:8px;">Part '+guided.sid+' Complete!</div><div style="color:var(--muted);font-size:14px;">Great work. Rest, hydrate, come back for the next part.</div></div>';
  document.getElementById('guidedDots').innerHTML='';
  setTimeout(exitGuided,2200);
}
function exitGuided(){
  guided.active=false;
  document.getElementById('guidedOverlay').classList.remove('show');
  releaseWakeLock();
  timerClose();
  if(activeDay)refreshSessionHeaders();else renderSchedule();
}
function reqWakeLock(){
  if('wakeLock' in navigator)navigator.wakeLock.request('screen').then(function(wl){wakeLock=wl;}).catch(function(){});
}
function releaseWakeLock(){if(wakeLock){wakeLock.release();wakeLock=null;}}

// ============ PROGRESS TAB ============
function renderProgress(){
  var totalEx=0;
  Object.keys(history).forEach(function(d){var h=history[d];if(h.checks)totalEx+=Object.keys(h.checks).length;});
  var fullDays=0,sessions=0;
  Object.keys(history).forEach(function(d){var h=history[d];if(h.days)fullDays+=Object.keys(h.days).length;if(h.sessions)sessions+=Object.keys(h.sessions).length;});
  var streak=calcStreak();
  var h='<div class="stat-grid">';
  h+='<div class="stat-card"><div class="stat-val" style="color:var(--accent)">'+totalEx+'</div><div class="stat-label">Total exercises</div></div>';
  h+='<div class="stat-card"><div class="stat-val" style="color:var(--green)">'+sessions+'</div><div class="stat-label">Parts completed</div></div>';
  h+='<div class="stat-card"><div class="stat-val" style="color:var(--yellow)">'+streak+' \uD83D\uDD25</div><div class="stat-label">Day streak</div></div>';
  h+='<div class="stat-card"><div class="stat-val" style="color:var(--purple)">'+fullDays+'</div><div class="stat-label">Full days (3 parts)</div></div>';
  h+='</div>';
  // 14-day calendar
  var today=todayKey();
  var activeDates=new Set(Object.keys(history).filter(function(k){var hh=history[k];return hh&&hh.checks&&Object.keys(hh.checks).length;}));
  var dots='';
  for(var i=13;i>=0;i--){
    var d=new Date();d.setDate(d.getDate()-i);
    var dk=d.toISOString().slice(0,10);
    dots+='<div class="streak-dot'+(activeDates.has(dk)?' done':'')+(dk===today?' today':'')+'">'+d.getDate()+'</div>';
  }
  h+='<div class="panel"><div class="panel-head"><div class="panel-title">\uD83D\uDCC5 Last 14 Days</div></div><div class="streak-bar">'+dots+'</div></div>';
  // PRs
  h+='<div class="panel"><div class="panel-head"><div class="panel-title">\uD83C\uDFC6 Personal Records</div></div>';
  PR_DEFS.forEach(function(pd){
    var best=prBest(pd.id);
    var pct=Math.min(100,Math.round((best/pd.goal)*100));
    h+='<div class="pr-card"><div class="pr-icon">'+pd.icon+'</div><div class="pr-info">';
    h+='<div class="pr-name">'+pd.name+'</div>';
    h+='<div class="pr-track"><div class="pr-fill" style="width:'+pct+'%"></div></div>';
    h+='<div class="pr-nums">Best: <b>'+best+' '+pd.unit+'</b> \u00B7 Goal: '+pd.goal+' ('+pct+'%)</div>';
    h+='</div><button class="pr-log-btn" data-id="'+pd.id+'" data-name="'+pd.name+'" data-unit="'+pd.unit+'" onclick="logPR(this)">+ Log</button></div>';
  });
  h+='</div>';
  // Weight
  var wHtml='';
  var lastW=weights.slice(-5).reverse();
  if(lastW.length){
    var first=weights[0].kg;
    lastW.forEach(function(e){
      var delta=(e.kg-first).toFixed(1);
      wHtml+='<div class="weight-row"><span class="weight-val">'+e.kg+' kg</span><span class="weight-delta" style="color:'+(e.kg<=first?'var(--green)':'var(--orange)')+'">'+(delta>0?'+':'')+delta+'</span><span class="weight-date">'+e.date+'</span></div>';
    });
  }else{
    wHtml='<div style="color:var(--muted);font-size:12px;padding:8px 0;">Log your weight weekly to see fat-loss progress. Starting: 92kg target: 70-75kg.</div>';
  }
  h+='<div class="panel"><div class="panel-head"><div class="panel-title">\u2696\uFE0F Body Weight</div><button class="panel-action" onclick="logWeight()">+ Log Weight</button></div>'+wHtml+'</div>';
  // Milestones
  h+='<div class="panel"><div class="panel-head"><div class="panel-title">\uD83C\uDF96\uFE0F Milestones ('+Object.keys(miles).length+'/'+MILE_DEFS.length+')</div></div><div class="mile-grid">';
  MILE_DEFS.forEach(function(m){
    h+='<div class="mile-card'+(miles[m.id]?' unlocked':'')+'"><div class="mile-icon">'+m.icon+'</div><div class="mile-name">'+m.name+'</div></div>';
  });
  h+='</div></div>';
  // Recent log
  var entries=[];
  Object.keys(history).forEach(function(d){
    var hh=history[d];
    if(hh.sessions)Object.keys(hh.sessions).forEach(function(k){var s=hh.sessions[k];entries.push({ts:s.ts,txt:'Day '+s.dayId+' Part '+s.sid+' - '+s.dayName});});
  });
  entries.sort(function(a,b){return b.ts-a.ts;});
  var logH='';
  entries.slice(0,12).forEach(function(e){
    var d=new Date(e.ts);
    logH+='<div class="log-item"><span class="log-name">'+e.txt+'</span><span class="log-meta">'+d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+'</span></div>';
  });
  if(!logH)logH='<div style="color:var(--muted);font-size:12px;padding:8px 0;">No completed parts yet. Go crush Part A!</div>';
  h+='<div class="panel"><div class="panel-head"><div class="panel-title">\uD83D\uDCDD Recent Activity</div></div>'+logH+'</div>';
  // Export
  h+='<div class="export-row"><button class="export-btn primary" onclick="exportData()">\u2B07\uFE0F Export All Data</button><button class="export-btn secondary" onclick="triggerImport()">\u2B06\uFE0F Import</button></div>';
  h+='<div style="font-size:11px;color:var(--muted);margin-top:8px;text-align:center;padding-bottom:20px;">Export saves everything: week, history, PRs, weight, milestones - all days, all data.</div>';
  document.getElementById('progressView').innerHTML=h;
}

function logPR(btn){
  var id=btn.dataset.id,name=btn.dataset.name,unit=btn.dataset.unit;
  var val=prompt('Log new PR for: '+name+'\nEnter '+unit+':');
  if(val===null)return;
  var n=parseInt(val);
  if(isNaN(n)||n<=0){alert('Enter a valid number');return;}
  if(!prs[id])prs[id]=[];
  var oldBest=prBest(id);
  prs[id].push({date:todayKey(),val:n,ts:Date.now()});
  save();
  checkPrMiles(id,n);
  if(n>oldBest&&oldBest>0)showToast('\uD83C\uDFC6 NEW PR! '+n+' '+unit+' (was '+oldBest+')');
  else showToast('\u2713 Logged '+n+' '+unit);
  renderProgress();
}
function logWeight(){
  var val=prompt('Enter current weight in kg:');
  if(val===null)return;
  var n=parseFloat(val);
  if(isNaN(n)||n<20||n>300){alert('Enter a valid weight');return;}
  weights.push({date:todayKey(),kg:n,ts:Date.now()});
  save();showToast('\u2713 Weight logged: '+n+'kg');
  renderProgress();
}

// ============ EXPORT / IMPORT ============
function exportData(){
  var data={version:3,exportedAt:new Date().toISOString(),currentWeek:currentWeek,history:history,prs:prs,weights:weights,miles:miles,edits:edits,media:{}};
  var keys=Object.keys(mediaKeySet);
  var pending=keys.length;
  function finish(){
    var blob=new Blob([JSON.stringify(data)],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download='athletic-blueprint-'+todayKey()+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('\u2713 Exported everything!');
  }
  if(!pending){finish();return;}
  keys.forEach(function(k){
    mediaGet(k,function(v){
      if(v)data.media[k]=v;
      pending--;
      if(pending<=0)finish();
    });
  });
}
function triggerImport(){document.getElementById('importInput').click();}
function importData(event){
  var file=event.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data.version)throw new Error('bad');
      if(confirm('Import backup from '+(data.exportedAt||'').slice(0,10)+'? This REPLACES current data.')){
        currentWeek=data.currentWeek||1;
        history=data.history||{};
        prs=data.prs||{};
        weights=data.weights||[];
        miles=data.miles||{};
        edits=data.edits||{};
        localStorage.setItem('ab2_edits',JSON.stringify(edits));
        if(data.media){
          Object.keys(data.media).forEach(function(k){mediaSet(k,data.media[k]);});
        }
        save();renderPhaseBar();renderSchedule();
        if(currentTab==='progress')renderProgress();
        showToast('\u2713 Imported everything!');
      }
    }catch(err){alert('Invalid backup file.');}
  };
  reader.readAsText(file);event.target.value='';
}


// ============ LIBRARY ============
var editingKey=null;
function renderLibrary(filter){
  filter=(filter||'').toLowerCase();
  var h='<input class="lib-search" id="libSearch" placeholder="Search exercises..." value="'+(filter||'')+'" oninput="renderLibraryFiltered(this)"/>';
  allDays().forEach(function(d){
    var rows='';
    d.sessions.forEach(function(s){
      s.exercises.forEach(function(ex){
        var nm=fxName(ex);
        if(filter&&nm.toLowerCase().indexOf(filter)<0)return;
        rows+='<div class="lib-row">';
        rows+='<div class="lib-name">'+nm+'</div>';
        rows+='<div class="lib-badges">';
        if(edits[ex._key])rows+='<span class="lib-edited">EDITED</span>';
        if(hasMedia(ex._key))rows+='<span class="lib-media-badge">\uD83D\uDCCE</span>';
        rows+='</div>';
        rows+='<button class="lib-edit-btn" data-key="'+ex._key+'" onclick="openEdit(this.dataset.key)">\u270F\uFE0F Edit</button>';
        rows+='</div>';
      });
    });
    if(rows){
      h+='<div class="lib-day-head" style="color:'+d.color+'">'+d.emoji+' '+d.name+'</div>'+rows;
    }
  });
  document.getElementById('libraryView').innerHTML=h;
}
var libTimer=null;
function renderLibraryFiltered(inp){
  clearTimeout(libTimer);
  var v=inp.value;
  libTimer=setTimeout(function(){
    renderLibrary(v);
    var s=document.getElementById('libSearch');
    if(s){s.focus();s.setSelectionRange(v.length,v.length);}
  },250);
}
function findExByKey(key){
  var found=null;
  allDays().forEach(function(d){d.sessions.forEach(function(s){s.exercises.forEach(function(ex){if(ex._key===key)found={ex:ex,day:d};});});});
  return found;
}
function openEdit(key){
  var f=findExByKey(key);
  if(!f)return;
  editingKey=key;
  var ex=f.ex;
  document.getElementById('editName').value=fxName(ex);
  document.getElementById('editSets').value=fxSets(ex,currentWeek);
  document.getElementById('editReps').value=fxReps(ex,currentWeek);
  document.getElementById('editSteps').value=fxSteps(ex).join('\n');
  document.getElementById('editTip').value=fxTip(ex)||'';
  fillEditMedia();
  document.getElementById('editModal').classList.remove('hidden');
}
function fillEditMedia(){
  var el=document.getElementById('editMedia');
  if(!editingKey||!el)return;
  if(hasMedia(editingKey)){
    el.innerHTML='<div class="media-slot" data-mkey="'+editingKey+'"></div><div class="media-btn-row"><button class="media-add" onclick="mediaUpload(editingKey)">\uD83D\uDCCE Change</button><button class="media-rm" onclick="mediaRemove(editingKey)">\uD83D\uDDD1 Remove</button></div>';
    loadMediaSlots(el);
  }else{
    el.innerHTML='<div class="media-btn-row"><button class="media-add" onclick="mediaUpload(editingKey)">\uD83D\uDCCE Upload GIF or Image</button></div>';
  }
}
function saveEdit(){
  if(!editingKey)return;
  var steps=document.getElementById('editSteps').value.split('\n').map(function(s){return s.trim();}).filter(function(s){return s;});
  edits[editingKey]={
    name:document.getElementById('editName').value.trim(),
    sets:document.getElementById('editSets').value.trim(),
    reps:document.getElementById('editReps').value.trim(),
    steps:steps,
    tip:document.getElementById('editTip').value.trim()
  };
  localStorage.setItem('ab2_edits',JSON.stringify(edits));
  closeEdit();
  showToast('\u2713 Saved - stored permanently');
  if(currentTab==='library')renderLibrary(document.getElementById('libSearch')?document.getElementById('libSearch').value:'');
  if(activeDay)renderDayDetail(findDay(activeDay));
}
function resetEdit(){
  if(!editingKey)return;
  if(!confirm('Reset this exercise to default?'))return;
  delete edits[editingKey];
  localStorage.setItem('ab2_edits',JSON.stringify(edits));
  closeEdit();
  showToast('\u2713 Reset to default');
  if(currentTab==='library')renderLibrary(document.getElementById('libSearch')?document.getElementById('libSearch').value:'');
  if(activeDay)renderDayDetail(findDay(activeDay));
}
function closeEdit(){
  editingKey=null;
  document.getElementById('editModal').classList.add('hidden');
}

// ============ TABS / WEEK ============
function changeWeek(dir){
  currentWeek=Math.max(1,Math.min(30,currentWeek+dir));
  if(currentWeek>=8)unlockMile('week8');
  if(currentWeek>=16)unlockMile('week16');
  if(currentWeek>=26)unlockMile('week26');
  save();renderPhaseBar();
  if(activeDay)renderDayDetail(findDay(activeDay));
  else renderSchedule();
}
function switchTab(tab){
  currentTab=tab;
  ['schedule','library','progress','rules'].forEach(function(t){
    document.getElementById('tab_'+t).classList.toggle('active',t===tab);
  });
  document.getElementById('scheduleView').classList.toggle('hidden',tab!=='schedule');
  document.getElementById('libraryView').classList.toggle('hidden',tab!=='library');
  document.getElementById('progressView').classList.toggle('hidden',tab!=='progress');
  document.getElementById('rulesView').classList.toggle('hidden',tab!=='rules');
  if(tab==='progress')renderProgress();
  if(tab==='rules')renderRules();
  if(tab==='library')renderLibrary('');
  if(tab==='schedule'){activeDay=null;renderSchedule();}
}
function renderRules(){
  var h='';
  RULES.forEach(function(r){
    h+='<div class="rule-card"><div class="rule-icon">'+r.icon+'</div><div><div class="rule-title">'+r.title+'</div><div class="rule-desc">'+r.desc+'</div></div></div>';
  });
  document.getElementById('rulesView').innerHTML=h;
}
function showToast(msg){
  var t=document.getElementById('toast');
  t.innerHTML=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2300);
}
function hideInstall(){document.getElementById('installBanner').classList.add('hidden');}

// ============ PWA ============
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();deferredInstall=e;
  document.getElementById('installBanner').classList.remove('hidden');
});
function installPWA(){
  if(!deferredInstall)return;
  deferredInstall.prompt();
  deferredInstall.userChoice.then(function(){deferredInstall=null;hideInstall();});
}
window.addEventListener('appinstalled',function(){hideInstall();showToast('\u2713 Installed!');});
if('serviceWorker' in navigator){
  try{
    var sw='self.addEventListener("install",function(e){self.skipWaiting()});self.addEventListener("fetch",function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request).then(function(res){var c=res.clone();caches.open("ab2").then(function(cache){cache.put(e.request,c)});return res}).catch(function(){return caches.match(e.request)})}))});';
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(function(){});
  }catch(e){}
}

// ============ INIT ============
document.addEventListener('DOMContentLoaded',function(){
  renderPhaseBar();
  renderSchedule();
  mediaLoadKeys(function(){
    if(currentTab==='schedule'&&!activeDay)renderSchedule();
  });
});
</script>
