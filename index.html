<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Athletic Blueprint</title>
<style>
  :root {
    --bg: #080B0F;
    --surface: #0F1318;
    --card: #141A21;
    --border: #1E2730;
    --text: #E8EDF2;
    --muted: #7A8FA8;
    --dim: #2D3748;
    --accent: #00D4FF;
    --green: #00E87A;
    --orange: #FF6B2B;
    --purple: #A855F7;
    --red: #FF3B5C;
    --yellow: #FFD60A;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:520px;margin:0 auto;}
  button{cursor:pointer;font-family:inherit;}

  /* HEADER */
  .header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px 0;}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .logo{font-size:18px;font-weight:900;letter-spacing:-0.5px;}
  .logo span{color:var(--accent);}
  .week-pill{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;}
  .week-pill b{color:var(--accent);}
  .week-btn{background:none;border:none;color:var(--muted);font-size:16px;padding:0 2px;line-height:1;}
  .week-btn:hover{color:var(--text);}
  .phase-bar{display:flex;gap:4px;margin-bottom:10px;}
  .phase-chip{flex:1;height:3px;border-radius:2px;background:var(--dim);}
  .phase-chip.active{background:var(--accent);}
  .phase-chip.done{background:var(--green);}

  /* NAV TABS */
  .tabs{display:flex;gap:4px;padding:0 0 12px;}
  .tab{flex:1;padding:8px 4px;border:none;border-radius:8px;font-size:11px;font-weight:700;background:var(--card);color:var(--muted);transition:all 0.15s;}
  .tab.active{background:var(--accent);color:#000;}

  /* SCHEDULE */
  .schedule{padding:14px 16px;padding-top:10px;}
  .phase-info{background:linear-gradient(135deg,#0A1628,#0D1F1A);border:1px solid #1A3040;border-radius:12px;padding:13px 15px;margin-bottom:14px;}
  .phase-title{font-size:13px;font-weight:800;color:var(--accent);margin-bottom:4px;}
  .phase-desc{font-size:12px;color:#A0B0C0;line-height:1.6;}
  .phase-desc b{color:var(--text);}

  .day-card{display:flex;align-items:center;width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:9px;text-align:left;transition:border-color 0.2s;}
  .day-card:hover{border-color:var(--dim);}
  .day-icon{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;margin-right:12px;}
  .day-meta{flex:1;min-width:0;}
  .day-label{font-size:10px;font-weight:800;letter-spacing:1px;margin-bottom:2px;}
  .day-name{font-size:15px;font-weight:700;margin-bottom:6px;}
  .day-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
  .tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:0.5px;}
  .progress-track{height:3px;background:var(--dim);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:2px;transition:width 0.4s;}
  .day-arrow{color:var(--dim);font-size:18px;margin-left:10px;}

  /* DAY DETAIL */
  .day-detail{display:block;}
  .day-header{padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
  .back-btn{background:none;border:none;font-size:13px;padding:0;margin-bottom:10px;display:block;}
  .day-header-info{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .day-header-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
  .day-header-text .day-label{display:block;font-size:11px;font-weight:800;letter-spacing:1px;margin-bottom:3px;}
  .day-header-text .day-name{font-size:20px;font-weight:800;}
  .day-note{border-radius:0 8px 8px 0;padding:9px 12px;margin-top:0;font-size:12px;color:var(--muted);line-height:1.5;border-left:3px solid;}
  .day-progress-row{display:flex;justify-content:space-between;align-items:center;margin-top:12px;margin-bottom:6px;}
  .day-progress-row span{font-size:12px;color:var(--muted);}
  .reset-btn{background:none;border:1px solid var(--dim);border-radius:6px;color:var(--muted);font-size:11px;padding:3px 10px;}

  .exercises-list{padding:12px 16px;}

  /* SECTION HEADERS */
  .section-header{display:flex;align-items:center;gap:8px;margin:16px 0 8px;padding:8px 10px;background:var(--surface);border-radius:8px;border-left:3px solid;}
  .section-header span{font-size:12px;font-weight:800;letter-spacing:0.5px;}
  .section-header small{font-size:10px;color:var(--muted);margin-left:auto;}

  /* EXERCISE CARD */
  .ex-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:7px;overflow:hidden;transition:border-color 0.2s;}
  .ex-card.checked{opacity:0.55;}
  .ex-card.bonus{border-style:dashed;}
  .ex-card.bonus.unlocked{border-style:solid;border-color:var(--yellow);}
  .ex-top{display:flex;align-items:center;padding:11px 12px;gap:10px;}
  .ex-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--dim);background:none;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.15s;}
  .ex-check.done{border-color:transparent;color:#000;}
  .ex-info{flex:1;min-width:0;}
  .ex-name{font-size:14px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:6px;}
  .bonus-badge{font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;background:#2A2010;color:var(--yellow);border:1px solid #3A3010;}
  .locked-badge{font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;background:#1A1A1A;color:var(--muted);}
  .ex-sets{font-size:11px;color:var(--muted);}
  .ex-sets b{color:var(--accent);}
  .ex-actions{display:flex;gap:6px;align-items:center;}
  .expand-btn{background:none;border:none;color:var(--muted);font-size:18px;padding:0;line-height:1;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
  .search-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:10px;font-weight:700;padding:4px 7px;letter-spacing:0.5px;}
  .search-btn:hover{color:var(--text);border-color:var(--dim);}

  /* EXPAND PANEL */
  .ex-expand{display:none;padding:0 12px 12px;border-top:1px solid var(--border);}
  .ex-expand.open{display:block;}
  .steps-title{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:10px 0 6px;}
  .step{display:flex;gap:8px;margin-bottom:5px;font-size:12px;color:#8A9BB0;line-height:1.5;}
  .step-num{width:16px;height:16px;border-radius:50%;background:var(--dim);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;margin-top:1px;}
  .tip-box{background:var(--surface);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:8px 10px;margin-top:8px;font-size:11px;color:#7A9BB0;line-height:1.5;}

  /* IMAGE SEARCH */
  .img-search-box{margin-top:10px;border:1px solid var(--border);border-radius:8px;overflow:hidden;display:none;}
  .img-search-box.open{display:block;}
  .img-search-top{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--surface);}
  .img-search-top span{font-size:11px;color:var(--muted);}
  .img-search-links{display:flex;gap:6px;}
  .open-browser-btn{font-size:10px;font-weight:700;color:var(--accent);background:none;border:1px solid var(--accent);border-radius:5px;padding:3px 8px;text-decoration:none;}
  .close-img-btn{background:none;border:none;color:var(--muted);font-size:16px;padding:0;width:20px;height:20px;}
  .img-iframe-wrap{position:relative;height:260px;background:#0A0A0A;}
  .img-iframe-wrap iframe{width:100%;height:100%;border:none;}
  .iframe-fallback{display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;gap:10px;font-size:13px;color:var(--muted);text-align:center;padding:20px;}
  .iframe-fallback.show{display:flex;}
  .iframe-fallback a{color:var(--accent);font-weight:700;font-size:13px;}

  /* PERFORMANCE TAB */
  .perf-section{padding:14px 16px;}
  .perf-week-selector{margin-bottom:14px;}
  .perf-week-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
  .week-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;}
  .wk-btn{padding:7px 0;border:none;border-radius:7px;background:var(--card);color:var(--muted);font-size:11px;font-weight:700;transition:all 0.15s;}
  .wk-btn.active{background:var(--accent);color:#000;}
  .wk-btn.done-wk{background:#0A2A1A;color:var(--green);}
  .targets-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
  .target-card{background:var(--card);border-radius:8px;padding:10px 12px;border:1px solid var(--border);}
  .target-label{font-size:10px;color:var(--muted);margin-bottom:4px;}
  .target-val{font-size:12px;font-weight:800;color:var(--text);line-height:1.3;}

  /* RULES */
  .rules-section{padding:14px 16px;}
  .rule-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:9px;display:flex;gap:14px;}
  .rule-icon{font-size:22px;flex-shrink:0;}
  .rule-title{font-size:14px;font-weight:700;margin-bottom:4px;}
  .rule-desc{font-size:12px;color:var(--muted);line-height:1.55;}

  /* TOAST */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#00E87A;color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;transition:transform 0.3s;z-index:999;pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  .hidden{display:none!important;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">Athletic <span>Blueprint</span></div>
    <div class="week-pill">
      <button class="week-btn" onclick="changeWeek(-1)">‹</button>
      Week <b id="weekNum">1</b>
      <button class="week-btn" onclick="changeWeek(1)">›</button>
    </div>
  </div>
  <div class="phase-bar" id="phaseBar"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('schedule',this)">📅 Schedule</button>
    <button class="tab" onclick="switchTab('rules',this)">📋 Rules</button>
  </div>
</div>

<!-- SCHEDULE VIEW -->
<div id="scheduleView">
  <div class="schedule" id="scheduleList"></div>
  <div class="day-detail hidden" id="dayDetail"></div>
</div>

<!-- RULES VIEW -->
<div id="rulesView" class="hidden rules-section"></div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ──────────────────────────────────────────────────────────────────
let currentWeek = parseInt(localStorage.getItem('aw_week')||'1');
let checked = JSON.parse(localStorage.getItem('aw_checked')||'{}');
let expanded = {};
let activeDay = null;
let currentTab = 'schedule';

function save(){
  localStorage.setItem('aw_week', currentWeek);
  localStorage.setItem('aw_checked', JSON.stringify(checked));
}

// ─── PHASE INFO ─────────────────────────────────────────────────────────────
const PHASES = [
  {num:1,weeks:"1–4",title:"Phase 1 — Foundation",color:"#00D4FF",
   desc:"<b>Goal:</b> Learn movement patterns, build base endurance, start fat loss. Low impact — shoulder-safe. Focus on form over reps.",
   plyo:"Plyometrics: <b>HOLD</b> — only light jumps. Master technique first."},
  {num:2,weeks:"5–8",title:"Phase 2 — Build",color:"#00E87A",
   desc:"<b>Goal:</b> Push volume up. 50→80 squats. Add first real plyometrics. Cardio base building fast.",
   plyo:"Plyometrics: <b>Phase 2 unlocked</b> — pogos, squat jumps, lateral hops added."},
  {num:3,weeks:"9–12",title:"Phase 3 — Explosive",color:"#FF6B2B",
   desc:"<b>Goal:</b> 100→150 squats. Explosive power, agility drills, full plyometrics. Serious athleticism begins here.",
   plyo:"Plyometrics: <b>Full program</b> — all explosive work active."},
  {num:4,weeks:"13–16",title:"Phase 4 — Peak",color:"#A855F7",
   desc:"<b>Goal:</b> 200 squats, peak explosiveness, max stamina. All exercises at full load. Maintain and push further.",
   plyo:"Plyometrics: <b>Maximum intensity</b> — add weights to upper body moves if shoulder is healed."},
];

function getPhase(w){ return Math.min(4, Math.ceil(w/4)); }
function getWeekInPhase(w){ return ((w-1)%4)+1; }

// ─── EXERCISE DATA ───────────────────────────────────────────────────────────
// Sets/reps scale by week. Format: [phase1val, phase2val, phase3val, phase4val]
// or a function(week) => string

function repsScale(base, inc, w){
  const p = getPhase(w);
  return base + (p-1)*inc;
}

const DAYS = [
  {
    id:1, emoji:"🦵", name:"Lower Body Endurance", duration:"45–60 min",
    color:"#00D4FF", colorBg:"#001A2A",
    note:"Foundation of everything athletic. Every rep of every squat is a deposit toward your 200 goal.",
    tags:["SQUATS","LUNGES","PLYOS","CALISTHENICS"],
    sections:[
      {title:"Warm-Up", icon:"🔥", color:"#FF6B2B", exercises:[
        {name:"Jumping Jacks",base:true,sets:w=>"2 sets",reps:w=>`${repsScale(20,10,w)} reps`,steps:["Arms and legs move in sync","Keep a light bounce, don't slam feet","Breathe rhythmically"],tip:"Gets blood flowing to everything. Never skip warm-up."},
        {name:"Hip Circles",base:true,sets:w=>"2 sets",reps:w=>"10 each side",steps:["Hands on hips, feet shoulder-width","Make the biggest circles you can","Slow and controlled — feel the hip joint open"],tip:"Lubricates hip joint before loading it."},
        {name:"Leg Swings (Forward)",base:true,sets:w=>"2 sets",reps:w=>"15 each leg",steps:["Hold wall for balance","Swing leg forward and back freely","Let momentum do the work — don't force range"],tip:"Dynamic hamstring and hip flexor warm-up."},
        {name:"Leg Swings (Side)",base:true,sets:w=>"2 sets",reps:w=>"15 each leg",steps:["Hold wall, swing leg across body and out","Stay relaxed — let the leg swing freely","Gradually increase range as muscles warm up"],tip:"Opens inner thigh and hip abductor."},
      ]},
      {title:"Squat Progression", icon:"🏋️", color:"#00D4FF", exercises:[
        {name:"Wall Sit",base:true,sets:w=>`${getPhase(w)>=2?3:2} sets`,reps:w=>`${repsScale(20,15,w)} sec`,steps:["Back flat against wall","Thighs parallel to floor","Arms relaxed — don't push on knees","Breathe steadily — don't hold breath"],tip:"Builds quad endurance directly. Time under tension without impact."},
        {name:"Bodyweight Squat",base:true,sets:w=>`${getPhase(w)>=2?4:3} sets`,reps:w=>`${repsScale(15,15,w)} reps`,steps:["Feet shoulder-width, toes slightly out","Break at hips first, then knees","Knees track over 2nd toe — never cave in","Go below parallel if mobility allows","Drive through full foot to stand"],tip:"Your path to 200. Track weekly PR — how many can you do unbroken?"},
        {name:"Sumo Squat",base:true,sets:w=>"3 sets",reps:w=>`${repsScale(12,8,w)} reps`,steps:["Wide stance, toes pointed 45° out","Drop straight down between legs","Knees push out hard the whole time","Great for inner thighs and glutes"],tip:"Works adductors and glutes more than regular squat."},
        {name:"Squat Hold (Bottom)",base:true,sets:w=>"2 sets",reps:w=>`${repsScale(20,20,w)} sec`,steps:["Lower to deepest squat position","Heels flat or use support — work toward flat","Relax hips into the bottom","Hold — use doorframe for support if needed"],tip:"Builds mobility and tendon strength simultaneously. Key for deep squat."},
        {name:"Cossack Squat",base:false,unlockWeek:3,sets:w=>"3 sets",reps:w=>`${repsScale(8,4,w)} each side`,steps:["Feet very wide — wider than sumo","Shift weight to one leg, bend that knee","Other leg straight, foot flexed — heel stays down","Come back up and shift to other side"],tip:"Unilateral strength + inner thigh stretch. Brutal and effective."},
        {name:"Bulgarian Split Squat",base:false,unlockWeek:5,sets:w=>"3 sets",reps:w=>`${repsScale(8,3,w)} each leg`,steps:["Rear foot elevated on sofa or chair","Front foot far enough forward — knee stays behind toes","Lower slowly — back knee toward floor","Drive through front heel to rise"],tip:"Best single-leg strength builder. Fixes imbalances fast."},
        {name:"Jump Squat",base:false,unlockWeek:5,sets:w=>`${getPhase(w)>=3?4:3} sets`,reps:w=>`${repsScale(6,4,w)} reps`,steps:["Regular squat descent — controlled","Explode up from bottom — full extension","Soft landing — absorb with bent knees","Reset and repeat"],tip:"Converts strength to explosive power. Core plyometric."},
        {name:"Pistol Squat (assisted)",base:false,unlockWeek:9,sets:w=>"3 sets",reps:w=>`${repsScale(5,2,w)} each leg`,steps:["Hold door frame for support","Extend one leg forward","Lower on single leg as far as possible","Push up through heel"],tip:"Elite single-leg strength. Work toward unassisted over months."},
      ]},
      {title:"Lunge Variations", icon:"🦵", color:"#A855F7", exercises:[
        {name:"Forward Lunge",base:true,sets:w=>"3 sets",reps:w=>`${repsScale(10,5,w)} each leg`,steps:["Step forward — big stride","Lower back knee toward floor","Front knee tracks over foot","Push back to start through front heel"],tip:"Builds leg strength unilaterally. Foundation movement."},
        {name:"Reverse Lunge",base:true,sets:w=>"3 sets",reps:w=>`${repsScale(10,5,w)} each leg`,steps:["Step BACK instead of forward","Easier on knees than forward lunge","Great for beginners and those with knee sensitivity","Control the descent"],tip:"Safer for knees. Works same muscles with less knee shear."},
        {name:"Lateral Lunge",base:true,sets:w=>"3 sets",reps:w=>`${repsScale(8,4,w)} each side`,steps:["Step wide to one side","Bend that knee — push hips back","Keep other leg straight","Return to center"],tip:"Inner thigh and glute medius. Frontal plane strength often neglected."},
        {name:"Walking Lunge",base:false,unlockWeek:3,sets:w=>"3 sets",reps:w=>`${repsScale(10,5,w)} total`,steps:["Lunge forward","Instead of returning — bring back foot forward into next lunge","Continue walking forward","Turn and come back"],tip:"Adds coordination and continuous tension. Great conditioning."},
        {name:"Jumping Lunge",base:false,unlockWeek:7,sets:w=>"3 sets",reps:w=>`${repsScale(6,3,w)} each side`,steps:["Start in lunge position","Jump and switch legs in air","Land softly in opposite lunge","Keep torso upright throughout"],tip:"Explosive power + cardio combined."},
      ]},
      {title:"Plyometrics", icon:"⚡", color:"#FFD60A", exercises:[
        {name:"Pogo Jumps",base:false,unlockWeek:5,sets:w=>"3 sets",reps:w=>`${repsScale(15,10,w)} reps`,steps:["Feet together, minimal knee bend","Bounce off balls of feet rapidly","Think: stiff legs, spring from ankles","Land quietly — absorb and immediately rebound"],tip:"Trains calf-Achilles spring mechanism. Starts all plyometric training."},
        {name:"Lateral Hops",base:false,unlockWeek:5,sets:w=>"3 sets",reps:w=>`${repsScale(10,5,w)} each side`,steps:["Jump laterally over imaginary line","Land on one foot if possible — soft","Immediately push back the other way","Increase speed as you improve"],tip:"Lateral explosiveness. Crucial for sport performance and agility."},
        {name:"Broad Jump",base:false,unlockWeek:7,sets:w=>"3 sets",reps:w=>`${repsScale(5,3,w)} reps`,steps:["Squat down with arm swing back","Explode forward — maximum distance","Land softly with bent knees","Measure and try to beat previous mark"],tip:"Pure horizontal power. Track distance as progress metric."},
        {name:"Box Jump (use stairs)",base:false,unlockWeek:9,sets:w=>"4 sets",reps:w=>`${repsScale(5,2,w)} reps`,steps:["Stand facing bottom stair","Squat and swing arms","Jump onto step — land softly with bent knees","Step down — don't jump down"],tip:"Vertical power. Use 1-2 stairs at first, increase height."},
        {name:"Burpees",base:false,unlockWeek:3,sets:w=>`${getPhase(w)>=3?4:3} sets`,reps:w=>`${repsScale(5,3,w)} reps`,steps:["Stand, drop hands to floor","Jump feet back to plank","Do a push-up (or skip push-up phase 1)","Jump feet forward, jump up with arms overhead"],tip:"Full body conditioning. Most efficient bodyweight cardio move."},
      ]},
    ]
  },
  {
    id:2, emoji:"💪", name:"Upper Body & Push Strength", duration:"40–55 min",
    color:"#FF6B2B", colorBg:"#2A1200",
    note:"Calisthenics upper body. Start light — shoulder injury means ZERO pain tolerance. Stop immediately if it hurts.",
    tags:["PUSH-UPS","SHOULDERS","TRICEPS","CHEST"],
    sections:[
      {title:"Warm-Up", icon:"🔥", color:"#FF6B2B", exercises:[
        {name:"Arm Circles",base:true,sets:w=>"2 sets",reps:w=>"20 each direction",steps:["Small circles → medium → large","Forward then backward","Keep shoulders relaxed — not hunched"],tip:"Mobilizes shoulder joint before any loading."},
        {name:"Shoulder Rolls",base:true,sets:w=>"2 sets",reps:w=>"15 each direction",steps:["Lift shoulders toward ears","Roll back and down — full circle","Slow and deliberate","Feel the shoulder blade movement"],tip:"Warms up rotator cuff and shoulder girdle."},
        {name:"Cat-Cow",base:true,sets:w=>"2 sets",reps:w=>"10 slow reps",steps:["On all fours — wrists under shoulders","Inhale: drop belly, lift head and tailbone (Cow)","Exhale: round spine up, tuck chin and pelvis (Cat)","Move slowly — breathe into each position"],tip:"Mobilizes entire spine — prep for all pushing movements."},
      ]},
      {title:"Push-Up Progressions", icon:"🤸", color:"#FF6B2B", exercises:[
        {name:"Wall Push-Up",base:true,sets:w=>`${getPhase(w)===1?3:2} sets`,reps:w=>`${repsScale(15,5,w)} reps`,steps:["Stand arm's length from wall","Hands shoulder-width on wall","Bend elbows — nose toward wall","Push back. Keep body straight"],tip:"Start here if you can't do floor push-ups yet. Zero shoulder strain."},
        {name:"Incline Push-Up",base:true,sets:w=>"3 sets",reps:w=>`${repsScale(10,5,w)} reps`,steps:["Hands on sofa/chair edge","Body in straight line","Lower chest toward surface","Push up — elbows at ~45° from body"],tip:"Easier than floor push-ups. Build up here first."},

// ─── PROGRESSIVE TARGETS ────────────────────────────────────────────────────
function getKegel(w){
  const p=getPhase(w), wp=getWeekInPhase(w);
  const base=[[10,12,15,20],[20,25,30,40],[40,50,60,80],[80,100,120,150]];
  return `${base[p-1][wp-1]} reps — ${[5,6,8,10][p-1]+wp} sec hold`;
}
function getHipThrust(w){
  const p=getPhase(w), wp=getWeekInPhase(w);
  const base=[[15,20,25,30],[35,40,45,50],[50,55,60,70],[70,80,90,100]];
  return `3 sets × ${base[p-1][wp-1]} reps`;
}
function getPlank(w){
  const p=getPhase(w), wp=getWeekInPhase(w);
  const base=[[20,25,30,40],[45,50,60,75],[80,90,105,120],[120,135,150,180]];
  return `${base[p-1][wp-1]} sec`;
}

// ─── RULES ──────────────────────────────────────────────────────────────────
const RULES=[
  {icon:"🩺",title:"Shoulder Rule",desc:"ANY shoulder pain = stop that exercise immediately. Pain-free range only. The shoulder injury needs 3-6 months. Use band work and scapular exercises to heal it actively."},
  {icon:"🦵",title:"Knee Rule",desc:"Knee tracks over 2nd toe. NEVER inward. If it caves: reduce reps until form holds, not just weight."},
  {icon:"🫁",title:"Breathing",desc:"Exhale on effort (pushing/pulling phase). Inhale on recovery. Holding breath spikes blood pressure and kills endurance."},
  {icon:"📈",title:"Progression Rule",desc:"Add reps or difficulty every 2 weeks. Not every session. Slow and sustainable beats fast and injured every time."},
  {icon:"💧",title:"Hydration",desc:"3–3.5L daily at your weight. Non-negotiable. Dehydration kills performance more than anything else."},
  {icon:"🍗",title:"Protein",desc:"110–150g protein daily. Without this your workouts break muscle down instead of building it. Eggs, dal, paneer, chicken — all count."},
  {icon:"😴",title:"Sleep",desc:"7–8 hours. Growth hormone releases during deep sleep. Your body changes happen here, not during the workout."},
  {icon:"⚖️",title:"Fat Loss",desc:"At 40% body fat, cardio + deficit matters as much as strength work. Aim for 500 kcal deficit. Fat loss will reveal the muscle you're building."},
  {icon:"🎯",title:"The 200 Squat Timeline",desc:"Month 1: 30→50 squats. Month 2-3: 50→100. Month 4-5: 100→150. Month 6: 150→200. This is realistic. Don't rush phases."},
  {icon:"🔥",title:"Performance Goal",desc:"The pelvic floor, hip thrust endurance, breathing control, and hip flexibility work on Day 4 directly builds what you want. These aren't 'extra' — they're central."},
];

// ─── RENDER PHASE BAR ────────────────────────────────────────────────────────
function renderPhaseBar(){
  const bar = document.getElementById('phaseBar');
  const phase = getPhase(currentWeek);
  bar.innerHTML = PHASES.map((p,i)=>`<div class="phase-chip ${i+1<phase?'done':i+1===phase?'active':''}" title="${p.title}"></div>`).join('');
  document.getElementById('weekNum').textContent = currentWeek;
}

// ─── RENDER SCHEDULE ────────────────────────────────────────────────────────
function renderSchedule(){
  const container = document.getElementById('scheduleList');
  const phase = PHASES[getPhase(currentWeek)-1];
  container.innerHTML = `
    <div class="phase-info">
      <div class="phase-title" style="color:${phase.color}">${phase.title} · Weeks ${phase.weeks}</div>
      <div class="phase-desc">${phase.desc}<br><span style="color:${phase.color};font-weight:700">${phase.plyo}</span></div>
    </div>
    ${DAYS.map(day=>{
      const {done,total} = dayProgress(day.id);
      return `<button class="day-card" onclick="openDay(${day.id})" style="border-left:4px solid ${day.color}">
        <div class="day-icon" style="background:${day.colorBg}">${day.emoji}</div>
        <div class="day-meta">
          <div class="day-label" style="color:${day.color}">DAY ${day.id} · ${day.duration}</div>
          <div class="day-name">${day.name}</div>
          <div class="day-tags">${day.tags.map(t=>`<span class="tag" style="background:${day.color}18;color:${day.color}">${t}</span>`).join('')}</div>
          <div class="progress-track"><div class="progress-fill" style="background:${day.color};width:${total>0?(done/total)*100:0}%"></div></div>
        </div>
        <div class="day-arrow">›</div>
      </button>`;
    }).join('')}
  `;
}

// ─── DAY PROGRESS ────────────────────────────────────────────────────────────
function dayProgress(dayId){
  const day = DAYS.find(d=>d.id===dayId);
  if(!day) return {done:0,total:0};
  let total=0, done=0;
  day.sections.forEach((sec,si)=>{
    sec.exercises.forEach((ex,ei)=>{
      const unlocked = ex.base || (ex.unlockWeek && currentWeek >= ex.unlockWeek);
      if(unlocked){ total++; if(checked[`d${dayId}_s${si}_e${ei}`]) done++; }
    });
  });
  return {done,total};
}

// ─── OPEN DAY ────────────────────────────────────────────────────────────────
function openDay(dayId){
  activeDay = dayId;
  const day = DAYS.find(d=>d.id===dayId);
  document.getElementById('scheduleList').classList.add('hidden');
  const detail = document.getElementById('dayDetail');
  detail.classList.remove('hidden');
  renderDayDetail(day);
  detail.scrollTop=0;
  window.scrollTo(0,0);
}

function closeDay(){
  activeDay = null;
  document.getElementById('scheduleList').classList.remove('hidden');
  document.getElementById('dayDetail').classList.add('hidden');
  renderSchedule();
}

// ─── RENDER DAY DETAIL ───────────────────────────────────────────────────────
function renderDayDetail(day){
  const {done,total} = dayProgress(day.id);
  const detail = document.getElementById('dayDetail');

  let sectionsHTML = '';
  day.sections.forEach((sec,si)=>{
    let exHTML = '';
    sec.exercises.forEach((ex,ei)=>{
      const unlocked = ex.base || (ex.unlockWeek && currentWeek >= ex.unlockWeek);
      const locked = !unlocked;
      const isBonus = !ex.base;
      const key = `d${day.id}_s${si}_e${ei}`;
      const isDone = !!checked[key];
      const sets = typeof ex.sets === 'function' ? ex.sets(currentWeek) : ex.sets;
      const reps = typeof ex.reps === 'function' ? ex.reps(currentWeek) : ex.reps;

      exHTML += `
        <div class="ex-card ${isDone?'checked':''} ${isBonus?'bonus':''} ${isBonus&&unlocked?'unlocked':''}" id="card_${key}">
          <div class="ex-top">
            <button class="ex-check ${isDone?'done':''}" style="${isDone?`background:${day.color}`:'border-color:'+day.color+'44'}" onclick="${locked?'':'toggleCheck(\''+key+'\',\''+day.color+'\')'}" ${locked?'disabled':''}>
              ${isDone?'✓':''}
            </button>
            <div class="ex-info">
              <div class="ex-name">
                ${ex.name}
                ${isBonus && locked ? `<span class="locked-badge">🔒 Unlocks Wk ${ex.unlockWeek}</span>` : ''}
                ${isBonus && unlocked ? `<span class="bonus-badge">⭐ BONUS</span>` : ''}
              </div>
              <div class="ex-sets"><b>${sets}</b> · ${reps}</div>
            </div>
            <div class="ex-actions">
              ${!locked ? `<button class="search-btn" onclick="toggleImgSearch('imgbox_${key}','${encodeURIComponent(ex.name+' exercise how to')}')">🔍 IMG</button>` : ''}
              <button class="expand-btn" onclick="toggleExpand('expand_${key}')">${expanded['expand_'+key]?'▴':'▾'}</button>
            </div>
          </div>
          <div class="ex-expand ${expanded['expand_'+key]?'open':''}" id="expand_${key}">
            <div class="steps-title">How to do it</div>
            ${ex.steps.map((s,i)=>`<div class="step"><div class="step-num">${i+1}</div><div>${s}</div></div>`).join('')}
            ${ex.tip ? `<div class="tip-box">💡 ${ex.tip}</div>` : ''}
            <div class="img-search-box" id="imgbox_${key}"></div>
          </div>
        </div>`;
    });

    sectionsHTML += `
      <div class="section-header" style="border-color:${sec.color}">
        <span>${sec.icon} ${sec.title}</span>
        <small style="color:${sec.color}">${sec.exercises.filter(e=>e.base||(e.unlockWeek&&currentWeek>=e.unlockWeek)).length} active</small>
      </div>
      ${exHTML}`;
  });

  detail.innerHTML = `
    <div class="day-header">
      <button class="back-btn" style="color:${day.color}" onclick="closeDay()">← Schedule</button>
      <div class="day-header-info">
        <div class="day-header-icon" style="background:${day.colorBg}">${day.emoji}</div>
        <div class="day-header-text">
          <span class="day-label" style="color:${day.color}">DAY ${day.id} · ${day.duration}</span>
          <div class="day-name">${day.name}</div>
        </div>
      </div>
      <div class="day-note" style="border-color:${day.color};background:${day.colorBg}">💬 ${day.note}</div>
      <div class="day-progress-row">
        <span>${done} of ${total} done</span>
        ${done>0?`<button class="reset-btn" onclick="resetDay(${day.id})">Reset Day</button>`:''}
      </div>
      <div class="progress-track"><div class="progress-fill" style="background:${day.color};width:${total>0?(done/total)*100:0}%"></div></div>
    </div>
    <div class="exercises-list">${sectionsHTML}</div>`;
}

// ─── TOGGLE ACTIONS ──────────────────────────────────────────────────────────
function toggleCheck(key, color){
  checked[key] = !checked[key];
  save();
  const card = document.getElementById('card_'+key);
  const btn = card.querySelector('.ex-check');
  if(checked[key]){
    card.classList.add('checked');
    btn.classList.add('done');
    btn.style.background = color;
    btn.textContent = '✓';
    showToast('✓ Done!');
  } else {
    card.classList.remove('checked');
    btn.classList.remove('done');
    btn.style.background = '';
    btn.style.borderColor = color+'44';
    btn.textContent = '';
  }
  // Update progress
  if(activeDay){
    const day = DAYS.find(d=>d.id===activeDay);
    const {done,total} = dayProgress(activeDay);
    const progFill = document.querySelector('.day-header .progress-fill');
    const progText = document.querySelector('.day-progress-row span');
    if(progFill) progFill.style.width = `${total>0?(done/total)*100:0}%`;
    if(progText) progText.textContent = `${done} of ${total} done`;
  }
}

function toggleExpand(id){
  expanded[id] = !expanded[id];
  const el = document.getElementById(id);
  if(el) el.classList.toggle('open', !!expanded[id]);
  const btn = el ? el.closest('.ex-card').querySelector('.expand-btn') : null;
  if(btn) btn.textContent = expanded[id] ? '▴' : '▾';
}

// ─── IMAGE SEARCH ────────────────────────────────────────────────────────────
function toggleImgSearch(boxId, query){
  const box = document.getElementById(boxId);
  if(!box) return;

  if(box.classList.contains('open')){
    box.classList.remove('open');
    box.innerHTML = '';
    return;
  }

  // Make sure parent expand is open
  const expand = box.closest('.ex-expand');
  if(expand && !expand.classList.contains('open')){
    expand.classList.add('open');
    const key = expand.id.replace('expand_','');
    expanded['expand_'+key] = true;
    const btn = expand.closest('.ex-card').querySelector('.expand-btn');
    if(btn) btn.textContent = '▴';
  }

  const decodedQuery = decodeURIComponent(query);
  const googleUrl = `https://www.google.com/search?tbm=isch&q=${query}&igu=1`;
  const fallbackUrl = `https://www.google.com/search?tbm=isch&q=${query}`;

  box.classList.add('open');
  box.innerHTML = `
    <div class="img-search-top">
      <span>Images: ${decodedQuery.replace('+exercise+how+to','').replace(/\+/g,' ')}</span>
      <div class="img-search-links">
        <a class="open-browser-btn" href="${fallbackUrl}" target="_blank">↗ Open</a>
        <button class="close-img-btn" onclick="closeImgSearch('${boxId}')">✕</button>
      </div>
    </div>
    <div class="img-iframe-wrap">
      <iframe src="${googleUrl}" title="Exercise images" onload="checkIframe(this,'${boxId}')" onerror="showFallback('${boxId}','${fallbackUrl}')"></iframe>
      <div class="iframe-fallback" id="fallback_${boxId}">
        <div>Images blocked in preview</div>
        <a href="${fallbackUrl}" target="_blank">Open Google Images →</a>
      </div>
    </div>`;
}

function checkIframe(iframe, boxId){
  try {
    // If iframe loaded but is blank or blocked, show fallback
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    if(!doc || doc.body.innerHTML === ''){
      showFallback(boxId, '');
    }
  } catch(e){
    // Cross-origin — iframe loaded external content (good sign, leave it)
    // But Google often blocks iframes — show fallback after short delay
    setTimeout(()=>{
      try {
        const d = iframe.contentDocument;
        if(!d) return; // cross-origin = actually loaded
      } catch(e2){
        // cross-origin means it actually loaded — this is fine
      }
    }, 1500);
  }
}

function showFallback(boxId, url){
  const f = document.getElementById('fallback_'+boxId);
  if(f) f.classList.add('show');
  const iframe = f ? f.previousElementSibling : null;
  if(iframe) iframe.style.display = 'none';
}

function closeImgSearch(boxId){
  const box = document.getElementById(boxId);
  if(box){ box.classList.remove('open'); box.innerHTML=''; }
}

// ─── RESET DAY ───────────────────────────────────────────────────────────────
function resetDay(dayId){
  const day = DAYS.find(d=>d.id===dayId);
  if(!day) return;
  day.sections.forEach((sec,si)=>{
    sec.exercises.forEach((_,ei)=>{
      delete checked[`d${dayId}_s${si}_e${ei}`];
    });
  });
  save();
  renderDayDetail(day);
}

// ─── WEEK CONTROL ────────────────────────────────────────────────────────────
function changeWeek(dir){
  currentWeek = Math.max(1, Math.min(16, currentWeek + dir));
  save();
  renderPhaseBar();
  if(activeDay){
    const day = DAYS.find(d=>d.id===activeDay);
    renderDayDetail(day);
  } else {
    renderSchedule();
  }
}

// ─── TAB SWITCHING ───────────────────────────────────────────────────────────
function switchTab(tab, btn){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('scheduleView').classList.toggle('hidden', tab!=='schedule');
  document.getElementById('rulesView').classList.toggle('hidden', tab!=='rules');
  if(tab==='rules') renderRules();
  if(tab==='schedule'){ activeDay=null; renderSchedule(); }
}

// ─── RENDER RULES ────────────────────────────────────────────────────────────
function renderRules(){
  document.getElementById('rulesView').innerHTML = RULES.map(r=>`
    <div class="rule-card">
      <div class="rule-icon">${r.icon}</div>
      <div><div class="rule-title">${r.title}</div><div class="rule-desc">${r.desc}</div></div>
    </div>`).join('');
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function(){
  renderPhaseBar();
  renderSchedule();
});
</script>
